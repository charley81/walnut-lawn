[build]
  command = "npx sanity build public/studio -y && node scripts/fix-studio-paths.js && pnpm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Proxy Sanity images through our domain to avoid third-party cookies
[[redirects]]
  from = "/sanity-images/*"
  to = "https://cdn.sanity.io/images/:splat"
  status = 200
